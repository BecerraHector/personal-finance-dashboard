services:
  db:
    image: postgres:16-alpine
    container_name: presupuestador-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: presupuestador
      POSTGRES_PASSWORD: presupuestador
      POSTGRES_DB: presupuestador
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
